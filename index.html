<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoAmigos: Gran Premio Decimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-pista: #546e7a;
            --color-hierba: #8bc34a;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            overflow: hidden;
            /* Fondo gris por defecto y carga de fondo.png */
            background: #555 url('fondo.png') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            color: #333;
        }

        /* --- EFECTO VELOCIDAD (LÍNEAS DE PISTA) --- */
        #lineas-pista {
            position: fixed;
            top: 77%;
            left: 0;
            width: 100vw;
            height: 15px;
            background-image: repeating-linear-gradient(90deg, white 0, white 100px, transparent 100px, transparent 200px);
            /* Velocidad aumentada un 100% (de 0.4s a 0.2s) */
            animation: avanzarLineas 0.2s linear infinite;
            z-index: 1; /* Se mantiene detrás de las motos */
            opacity: 0.8;
        }

        @keyframes avanzarLineas {
            from { background-position: 0 0; }
            /* Animación hacia la derecha (de -200px a 200px) */
            to { background-position: 200px 0; }
        }

        /* --- PANTALLAS --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9000; /* Aumentado para evitar solapamiento con motos */
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* --- UI / MARCADORES --- */
        #ui-superior {
            position: fixed;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 8000; /* Aumentado */
        }

        .stat-card {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            border: 3px solid #333;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
        }

        #timer-container {
            position: fixed;
            top: 155px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            border: 3px solid #333;
            overflow: hidden;
            z-index: 8000; /* Aumentado */
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: #4caf50;
            transition: width 0.1s linear, background 0.5s;
        }

        /* --- PREGUNTA --- */
        #panel-pregunta {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            border: 4px solid #37474f;
            text-align: center;
            z-index: 7000; /* Aumentado */
            box-shadow: 0 8px 0 #cfd8dc;
        }

        .descomposicion {
            font-size: 32px;
            font-weight: 700;
            color: #d32f2f;
        }

        /* --- MOTOS --- */
        .moto-contenedor {
            position: absolute;
            width: 260px;
            height: 260px;
            cursor: pointer;
            /* El z-index se aplica por JS dinámicamente */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .moto-img {
            width: 180px;
            height: auto;
            display: block;
        }

        .moto-fallback {
            font-size: 120px;
            line-height: 1;
        }

        .numero-moto {
            margin-top: 10px;
            font-size: 32px;
            font-weight: 700;
            background: #37474f;
            color: white;
            padding: 4px 20px;
            border-radius: 20px;
            border: 4px solid white;
            white-space: nowrap;
        }

        /* --- BOTONES --- */
        .btn-play {
            background: #ffeb3b;
            border: none;
            padding: 20px 40px;
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #fbc02d;
            margin-top: 20px;
        }
        .btn-play:hover { background: #fff176; }

        #mensaje-pop {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            z-index: 9999; /* Aumentado al máximo */
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="overlay">
        <h1>🏁 MOTOAMIGOS: GP DECIMAL 🏁</h1>
        <div style="max-width: 500px; font-size: 20px; line-height: 1.5;">
            <p>1. Mira la descomposición en el panel superior.</p>
            <p>2. ¡Busca la moto con el número correcto!</p>
            <p>3. Tienes 30 segundos por pantalla.</p>
            <p>4. Acierto: +10 puntos | Fallo: -1 punto.</p>
        </div>
        <button class="btn-play" onclick="empezarJuego()">¡ARRANCAR MOTOS!</button>
    </div>

    <div id="ui-superior">
        <div class="stat-card">NIVEL: <span id="txt-nivel">1</span> / 50</div>
        <div class="stat-card">PUNTOS: <span id="txt-puntos">0</span></div>
    </div>

    <div id="panel-pregunta">
        <div id="texto-pregunta" class="descomposicion">---</div>
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="mensaje-pop"></div>

    <div id="pantalla-final" class="overlay" style="display:none;">
        <h1 id="titulo-final">CARRERA TERMINADA</h1>
        <h2 style="font-size: 40px;">PUNTUACIÓN: <span id="puntos-final">0</span></h2>
        <button class="btn-play" onclick="location.reload()">REINTENTAR</button>
    </div>

    <div id="lineas-pista"></div>

    <div id="game-area"></div>

<script>
    const TIEMPO_MAX = 30;
    const MAX_NIVELES = 50;
    const TOTAL_MOTOS = 5;

    let puntos = 0;
    let nivelActual = 1;
    let tiempoRestante = TIEMPO_MAX;
    let cascos = [];
    let juegoActivo = false;
    let timerInterval;

    function empezarJuego() {
        document.getElementById('pantalla-inicio').style.display = 'none';
        juegoActivo = true;
        generarNivel();
        iniciarTimer();
        mover();
    }

    function generarNivel() {
        if (nivelActual > MAX_NIVELES) { finalizarJuego("¡ERES UN CRACK!"); return; }
        
        document.getElementById('txt-nivel').innerText = nivelActual;
        tiempoRestante = TIEMPO_MAX;
        
        const unidades = ["C", "D", "U", "d", "c"];
        let valores = { C:0, D:0, U:0, d:0, c:0 };
        let partes = [];
        
        const numPartes = 3 + Math.floor(Math.random() * 3);
        const keys = [...unidades].sort(() => Math.random() - 0.5).slice(0, numPartes);
        
        keys.forEach(k => {
            valores[k] = Math.floor(Math.random() * 9) + 1;
            partes.push(`${valores[k]} ${k}`);
        });

        const correctNum = parseFloat(`${valores.C}${valores.D}${valores.U}.${valores.d}${valores.c}`);
        document.getElementById('texto-pregunta').innerText = partes.join(", ");

        const area = document.getElementById('game-area');
        area.innerHTML = '';
        cascos = [];

        let opciones = [correctNum];
        while(opciones.length < 5) {
            let offset = (Math.random() * 20 - 10).toFixed(2);
            let incorrecto = Math.abs(parseFloat(correctNum) + parseFloat(offset)).toFixed(2);
            if(!opciones.includes(incorrecto)) opciones.push(parseFloat(incorrecto));
        }
        opciones.sort(() => Math.random() - 0.5);

        let minY = window.innerHeight * 0.55; 
        let maxY = window.innerHeight - 260;
        if (minY > maxY) minY = maxY - 20;

        opciones.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'moto-contenedor';
            
            const motoNum = i + 1;
            div.innerHTML = `
                <img src="moto${motoNum}.png" class="moto-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div class="moto-fallback" style="display:none;">🏍️</div>
                <div class="numero-moto">${val.toFixed(2).replace('.', ',')}</div>
            `;
            
            const obj = {
                el: div,
                val: val,
                x: Math.random() * (window.innerWidth - 260),
                y: Math.random() * (maxY - minY) + minY,
                vx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.75 + 1.4),
                vy: 0 
            };

            // Regla de perspectiva: A mayor Y (más abajo en pantalla), mayor capa Z.
            div.style.zIndex = Math.floor(obj.y);

            div.onclick = () => checkRespuesta(val, correctNum, obj);
            area.appendChild(div);
            cascos.push(obj);
        });
    }

    function checkRespuesta(elegido, correcto, obj) {
        if(!juegoActivo) return;

        if (Math.abs(elegido - correcto) < 0.01) {
            puntos += 10;
            popMensaje("¡SÍ! +10", "#4caf50");
            nivelActual++;
            generarNivel();
        } else {
            puntos = Math.max(0, puntos - 1);
            popMensaje("-1", "#f44336");
            obj.vx *= 1.5; 
        }
        document.getElementById('txt-puntos').innerText = puntos;
    }

    function iniciarTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!juegoActivo) return;
            tiempoRestante -= 0.1;
            const porcentaje = (tiempoRestante / TIEMPO_MAX) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = porcentaje + "%";

            if(porcentaje < 30) bar.style.background = "#f44336";
            else bar.style.background = "#4caf50";

            if(tiempoRestante <= 0) {
                finalizarJuego("¡SE ACABÓ EL TIEMPO!");
            }
        }, 100);
    }

    function mover() {
        if(!juegoActivo) return;
        
        const maxX = window.innerWidth - 260;

        cascos.forEach(c => {
            c.x += c.vx; 
            
            if (c.x <= 0 || c.x >= maxX) c.vx *= -1;
            
            c.el.style.transform = `translate(${c.x}px, ${c.y}px)`;
        });
        requestAnimationFrame(mover);
    }

    function popMensaje(txt, col) {
        const m = document.getElementById('mensaje-pop');
        m.innerText = txt;
        m.style.color = col;
        m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 600);
    }

    function finalizarJuego(motivo) {
        juegoActivo = false;
        clearInterval(timerInterval);
        document.getElementById('titulo-final').innerText = motivo;
        document.getElementById('puntos-final').innerText = puntos;
        document.getElementById('pantalla-final').style.display = 'flex';
    }
</script>
</body>
</html>
